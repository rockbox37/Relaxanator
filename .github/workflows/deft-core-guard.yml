name: deft-core-guard

# Deft framework guard (#1430): a single PR should not mix changes to the
# vendored framework payload (.deft/core/**) with changes to your own project
# files. Framework updates come from `deft-install` / upgrade and should
# land in their own PR so reviewers (and bot reviewers) can treat them as
# packaged, machine-managed assets. Delete this file if you do not want the guard.
on:
  pull_request:

permissions:
  contents: read

jobs:
  no-mixed-core-and-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Refuse PRs that mix .deft/core/** with non-framework paths
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -eu
          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files:"
          echo "$changed"
          core=$(printf '%s\n' "$changed" | grep -E '^\.deft/core/' || true)
          app=$(printf '%s\n' "$changed" | grep -vE '^\.deft/core/' | grep -vE '^AGENTS\.md$|^\.agents/|^\.githooks/|^\.claude/settings\.json$|^\.grok/hooks/deft\.json$|^\.cursor/hooks\.json$|^\.cursor/hooks/deft-cursor-hook-adapter\.mjs$|^\.codex/hooks\.json$|^\.gitattributes$|^\.gitignore$|^\.prettierignore$|^greptile\.json$|^\.github/codeql/codeql-config\.yml$|^\.github/workflows/deft-core-guard\.yml$|^Taskfile\.yml$|^vbrief/\.deft-version$|^vbrief/vbrief\.md$|^vbrief/schemas/|^vbrief/migration/|^vbrief/proposed/\.gitkeep$|^vbrief/pending/\.gitkeep$|^vbrief/active/\.gitkeep$|^vbrief/completed/\.gitkeep$|^vbrief/cancelled/\.gitkeep$|^xbrief/\.deft-version$|^xbrief/xbrief\.md$|^xbrief/schemas/|^xbrief/migration/|^xbrief/proposed/\.gitkeep$|^xbrief/pending/\.gitkeep$|^xbrief/active/\.gitkeep$|^xbrief/completed/\.gitkeep$|^xbrief/cancelled/\.gitkeep$' | grep -v '^$' || true)
          if [ -n "$core" ] && [ -n "$app" ]; then
            echo "::error title=deft-core guard (#1430)::This PR changes the vendored framework payload (.deft/core/**) AND non-framework files. Split the framework update into its own PR."
            echo "--- framework (.deft/core/**) changes ---"; printf '%s\n' "$core"
            echo "--- non-framework changes ---"; printf '%s\n' "$app"
            exit 1
          fi
          echo "OK: no mixed framework + app changes."
